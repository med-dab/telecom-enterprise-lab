frr version 8.4_git
frr defaults traditional
hostname R-BR2
no ipv6 forwarding
!
interface eth0
 ip address 172.16.4.2/30
 ip ospf network point-to-point
exit
!
interface lo
 ip address 1.1.1.3/32
exit
!
router bgp 65003
 bgp router-id 1.1.1.3
 neighbor 1.1.1.121 remote-as 65000
 neighbor 1.1.1.121 ebgp-multihop 5
 neighbor 1.1.1.121 update-source lo
 !
 address-family ipv4 unicast
  network 10.3.0.0/24
 exit-address-family
exit
!
router ospf
 ospf router-id 1.1.1.3
 network 1.1.1.3/32 area 3
 network 10.3.0.0/24 area 3
 network 172.16.4.0/30 area 3
 area 3 stub
exit
!
