frr version 8.4_git
frr defaults traditional
hostname ABR-1
no ipv6 forwarding
!
interface eth1
 ip address 172.16.1.2/30
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 172.16.3.1/30
 ip ospf network point-to-point
exit
!
interface eth3
 ip address 172.16.3.5/30
 ip ospf network point-to-point
exit
!
interface lo
 ip address 1.1.1.120/32
exit
!
router ospf
 ospf router-id 1.1.1.120
 network 1.1.1.120/32 area 0
 network 172.16.1.0/30 area 0
 network 172.16.3.0/30 area 1
 network 172.16.3.4/30 area 2
 area 1 range 10.1.0.0/23
 area 2 range 10.2.0.0/23
exit
!
